version: "3.9"

services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=info
    # Install deps then launch; use a real Dockerfile in production to bake the image
    command: >
      sh -c "pip install --quiet -r requirements.txt &&
             uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --log-level ${LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
